# War Room repo manifest — TEMPLATE.
#
# Copy this file to `repos.yaml` (or run `warroom setup`) and replace the
# placeholders with your own org and repos. `repos.yaml` is gitignored so your
# project-specific manifest never travels upstream to the shared War Room.
#
# `warroom bootstrap` clones every active repo below into `local_root`.
version: 1
defaults:
  owner: your-org
  clone_protocol: ssh
  default_branch: main
  local_root: maps/repos
  # Optional project-wide settings. Uncomment/set the ones you use; War Room
  # falls back to generic defaults (campaign owner = `owner`, project number 1)
  # and the SDK-to-demo `dev link` feature stays off until npm_scope is set.
  # campaign_owner: your-org           # GitHub org that owns the Campaign Map project
  # campaign_project_number: 1         # GitHub Project number for the Campaign Map
  # npm_scope: "@your-scope"           # npm scope for `warroom dev link` (sdk -> demo)
  # dev_link_packages: [shared, js]    # workspace packages to mirror+link
  # e2e_backend_base_url: https://api.local.example.com   # `pr merge` Playwright gate
  # e2e_demo_base_url: https://demo.local.example.com
  # e2e_local_host_suffix: local.example.com              # trusted local TLS host
repos:
  # A minimal active repo. The only required merge automation is whatever your
  # repo actually uses — delete the blocks you do not need.
  - id: app
    name: App
    github: your-org/app
    ssh_url: git@github.com:your-org/app.git
    local_path: maps/repos/app
    status: active
    merge:
      playwright: false
      bump: false
      changelog: false
    owner: app
    description: Primary application repository.
    specialist:
      name: App Sergeant
      context:
        frameworks:
          - TypeScript
        domains:
          - application code
        resources:
          - github-cli
          - typescript-docs

  # A fuller example showing every merge-automation option.
  - id: sdk
    name: SDK
    github: your-org/sdk
    ssh_url: git@github.com:your-org/sdk.git
    local_path: maps/repos/sdk
    status: active
    merge:
      playwright: true
      bump:
        enabled: true
        command: pnpm bump:version
      post_merge: npm run build
      changelog:
        enabled: true
        format: openchangelog # or keep-a-changelog
        path: release-notes
        url: https://changelog.example.com
    owner: sdk
    description: SDK packages published to a registry.
    specialist:
      name: SDK Sergeant
      context:
        frameworks:
          - TypeScript
          - pnpm
        domains:
          - package publishing
        resources:
          - github-cli
          - npm-docs
          - typescript-docs

  # A planned repo is mapped but skipped by bootstrap until promoted to active.
  - id: infra
    name: infra
    github: your-org/infra
    ssh_url: git@github.com:your-org/infra.git
    local_path: maps/repos/infra
    status: planned
    merge:
      playwright: false
      bump: false
      changelog: false
    owner: infra
    description: Infrastructure and operational configuration.
    specialist:
      name: Infra Sergeant
      context:
        frameworks:
          - Terraform
        domains:
          - infrastructure safety
        resources:
          - github-cli
